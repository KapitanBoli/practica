services:
  neural-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neural-worker
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - POETRY_VIRTUALENVS_CREATE=false
    restart: unless-stopped
    networks:
      - neural-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

networks:
  neural-network:
    driver: bridge